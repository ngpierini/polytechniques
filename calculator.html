<!-- Self-report if app.js fails to build the calculator (e.g. a syntax/runtime
     error on a specific locked browser). Registered before the deferred app.js
     so it catches parse and runtime errors; ES5-safe so it runs anywhere. -->
<script>
(function () {
  window.__calcErrs = [];
  window.addEventListener("error", function (e) {
    try {
      var m = (e && (e.message || (e.error && e.error.message))) || "script error";
      var f = (e && e.filename) ? (" [" + e.filename.split("/").pop() + ":" + (e.lineno || "?") + ":" + (e.colno || "?") + "]") : "";
      window.__calcErrs.push(m + f);
    } catch (_) {}
  });
  window.addEventListener("unhandledrejection", function (e) {
    try {
      var r = e && e.reason;
      var m = (r && (r.message || (r.toString && r.toString()))) || "unhandled promise rejection";
      window.__calcErrs.push("[promise] " + m);
    } catch (_) {}
  });
  function esc(s) { return String(s).replace(/[<>&]/g, function (c) { return c === "<" ? "&lt;" : c === ">" ? "&gt;" : "&amp;"; }); }
  function showCalcError() {
    var tabs = document.getElementById("tabs");
    var app = document.getElementById("app");
    var built = tabs && tabs.children.length > 0;
    var hasResults = !!document.querySelector("#app .stat");   // the initial calculation ran
    var errs = window.__calcErrs;
    if (built && hasResults && errs.length === 0) return true;   // fully working: nothing to show
    if (document.getElementById("calc-err-banner")) return false;
    // Pick the message that matches how far the code got.
    var msg;
    if (errs.length) msg = "The calculator hit an error, which is likely why the controls don't respond. Copy this whole message to the site owner:";
    else if (built) msg = "The calculator drew its controls but did not finish starting up (they won't respond), and no error was thrown. Please send the site owner this note and the browser line below:";
    else msg = "The calculator's code did not run at all. Please send the site owner the browser line below:";
    var b = document.createElement("div");
    b.id = "calc-err-banner";
    b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:2147483647;margin:0;padding:14px 18px;" +
      "background:#fff5f5;color:#2a0a0a;border-bottom:4px solid #d64545;box-shadow:0 3px 12px rgba(0,0,0,0.28);" +
      "font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:0.95rem;line-height:1.4;max-height:80vh;overflow:auto;";
    b.innerHTML = "<strong>" + msg + "</strong>" +
      (errs.length ? '<code style="display:block;white-space:pre-wrap;margin-top:6px;color:#b00020;font-size:0.85rem;">' + esc(errs.join("\n")) + "</code>" : "") +
      '<div style="margin-top:6px;font-size:0.8rem;color:#555;">' + esc(navigator.userAgent) + "</div>" +
      '<div style="margin-top:4px;font-size:0.8rem;">The other tools are on the <a href="home.html">home page</a>.</div>';
    document.body.insertBefore(b, document.body.firstChild);
    return false;
  }
  // Run on a plain timer, NOT window.load: on a network that blackholes an
  // external resource (e.g. the analytics script), the load event can be
  // delayed for minutes, which kept this reporter from ever running and hid the
  // real error. These fire relative to page parse, after app.js's
  // DOMContentLoaded init has run (or thrown).
  setTimeout(showCalcError, 2500);
  setTimeout(showCalcError, 6000);   // re-check: a rejection or late error can arrive after the first pass
})();
</script>
