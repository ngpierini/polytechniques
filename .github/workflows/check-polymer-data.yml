name: Check polymer data integrity

# Runs on every PR/push that touches polymer-data.js (human-authored or
# from the automated discovery pipeline) and fails if an entry is
# malformed - duplicate name/CAS/structure, a bond pointing at a
# nonexistent atom, a missing chain-end pseudo-atom, or an obviously bad
# valence. See scripts/check-polymer-data.js for what it actually checks.

on:
  pull_request:
    paths:
      - 'polymer-data.js'
      - 'polymer-graph.js'
      - 'search-index.json'
      - 'scripts/**'
  push:
    branches:
      - main
    paths:
      - 'polymer-data.js'
      - 'polymer-graph.js'
      - 'search-index.json'
      - 'scripts/**'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: node scripts/check-polymer-data.js

      # Fails if search-index.json wasn't regenerated after a data change.
      - run: npm run check-index
